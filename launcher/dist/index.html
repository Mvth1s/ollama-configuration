<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ollama Launcher</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<main>
  <h1>Ollama Launcher</h1>

  <button type="button" id="webui-btn" class="primary full">Open Web UI</button>

  <section>
    <h2>Network access</h2>
    <label class="lan-row">
      <input type="checkbox" id="lan-toggle" />
      Allow access from other devices on my network
    </label>
    <p id="lan-warning" class="lan-warning hidden">No login is required by default (WEBUI_AUTH=False): anyone on your network will be able to use Open WebUI without signing in.</p>
    <div id="lan-status" class="lan-status"></div>
  </section>

  <section>
    <h2>Models</h2>
    <div id="models-empty" class="empty">Loading...</div>
    <table id="models-table" class="models hidden">
      <thead>
        <tr>
          <th>Name</th>
          <th>Size</th>
          <th>Params</th>
          <th>Quant</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="models-body"></tbody>
    </table>
  </section>

  <section>
    <h2>Pull a model</h2>
    <div class="pull-row">
      <input type="text" id="pull-input" placeholder="e.g. llama3.2:3b" />
      <button type="button" id="pull-btn">Pull</button>
    </div>
    <div id="pull-status" class="pull-status"></div>
  </section>

  <p id="error" class="error hidden"></p>
</main>
<script src="main.js"></script>
</body>
</html>
