name: Rust CI

# gui/ and launcher/ were previously only ever compiled at release time, by
# build-desktop.yml after a version tag is pushed - so a broken build or a
# clippy error was invisible until a release was already underway. This runs
# on every push/PR instead, catching that far earlier.
#
# clippy is intentionally not run with -D warnings: this only fails the job
# on genuine compile errors, not on lint warnings, since the current warning
# baseline for gui/launcher hasn't been audited yet. Tighten to -D warnings
# once that baseline is clean.
on:
  push:
  pull_request:

jobs:
  clippy-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [gui, launcher]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux WebKitGTK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "${{ matrix.app }}/src-tauri -> target"

      - name: cargo clippy
        working-directory: ${{ matrix.app }}/src-tauri
        run: cargo clippy --all-targets --all-features

      - name: cargo build
        working-directory: ${{ matrix.app }}/src-tauri
        run: cargo build --all-targets
