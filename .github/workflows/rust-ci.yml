name: Rust CI

# gui/ and launcher/ were previously only ever compiled at release time, by
# build-desktop.yml after a version tag is pushed - so a broken build or a
# clippy error was invisible until a release was already underway. This runs
# on every push/PR instead, catching that far earlier.
#
# clippy runs with -D warnings: the gui/launcher baseline was confirmed clean
# (zero clippy warnings) by PR #13's CI run on 2026-07-22, so any new warning
# now fails the job instead of accumulating as unaudited lint debt.
on:
  push:
  pull_request:

jobs:
  clippy-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [gui, launcher]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux WebKitGTK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "${{ matrix.app }}/src-tauri -> target"

      - name: cargo clippy
        working-directory: ${{ matrix.app }}/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo build
        working-directory: ${{ matrix.app }}/src-tauri
        run: cargo build --all-targets
