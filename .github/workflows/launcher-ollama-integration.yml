name: Launcher vs live Ollama

# The launcher's cargo test (test.yml, every push/PR) only ever exercises
# list_models/pull_model/delete_model against fixed JSON fixtures - never
# against a real Ollama daemon and its actual HTTP contract. This workflow
# runs the one #[ignore]d integration test that does (see
# pull_list_and_delete_round_trip_against_live_ollama in
# launcher/src-tauri/src/main.rs), against a real, freshly installed Ollama.
#
# workflow_dispatch only, not on every push/PR: it downloads a real model
# (~45 MB, "all-minilm") from Ollama's registry every run, which is wasted
# cost/time for a check that isn't expected to regress often - the launcher
# code it covers changes rarely. Run manually after touching
# pull_model/list_models/delete_model, or on a schedule if that turns out to
# be too easy to forget.
on:
  workflow_dispatch:

jobs:
  ollama-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux WebKitGTK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "launcher/src-tauri -> target"

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and wait for it to be ready
        run: |
          sudo systemctl enable --now ollama
          for _ in $(seq 1 30); do
            if curl -fs http://127.0.0.1:11434 >/dev/null 2>&1; then
              echo "Ollama is ready."
              exit 0
            fi
            sleep 1
          done
          echo "Ollama did not start in time." >&2
          exit 1

      - name: cargo test -- --ignored
        working-directory: launcher/src-tauri
        run: cargo test -- --ignored
