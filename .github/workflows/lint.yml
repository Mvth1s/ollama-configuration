name: Lint

# Runs ShellCheck over every Bash script on each push and pull request. Run
# the same command locally: shellcheck -x *.sh lib/*.sh (see README.md).
on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: shellcheck -x *.sh lib/*.sh
